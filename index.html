<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โหวตโปรเจ็ก | GlobalByte Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Kanit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --card: #161b28;
    --card-hover: #1c2235;
    --border: #252d3f;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --gradient: linear-gradient(135deg, #00d4ff, #7c3aed);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,13,20,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    font-family: 'Kanit', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }

  .logo span {
    font-size: 0.65rem;
    font-weight: 400;
    display: block;
    -webkit-text-fill-color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.82rem;
    color: var(--text-dim);
  }

  .stat-pill strong {
    color: var(--accent);
    font-family: 'Kanit', sans-serif;
  }

  /* Hero */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 32px 40px;
  }

  .hero-badge {
    display: inline-block;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 0.78rem;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-family: 'Kanit', sans-serif;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 16px;
  }

  .hero h1 .gradient-text {
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    color: var(--text-dim);
    font-size: 1rem;
    max-width: 540px;
    margin: 0 auto 32px;
    line-height: 1.7;
  }

  /* Controls */
  .controls {
    position: relative;
    z-index: 1;
    padding: 0 32px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
  }

  .search-box {
    flex: 1;
    min-width: 240px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-muted); }

  .search-box svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  .filter-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .filter-tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.82rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-tab:hover { border-color: var(--accent); color: var(--accent); }

  .filter-tab.active {
    background: rgba(0,212,255,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text-dim);
    font-family: 'Sarabun', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    outline: none;
  }

  /* Grid */
  .grid-container {
    position: relative;
    z-index: 1;
    padding: 0 32px 60px;
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(0,212,255,0.4);
    box-shadow: 0 12px 40px rgba(0,212,255,0.08);
    background: var(--card-hover);
  }

  .card.voted {
    border-color: rgba(16,185,129,0.4);
    box-shadow: 0 0 20px rgba(16,185,129,0.08);
  }

  .card-img {
    width: 100%;
    height: 185px;
    object-fit: cover;
    background: var(--surface);
    display: block;
    position: relative;
  }

  .card-img-wrap {
    position: relative;
    overflow: hidden;
  }

  .card-img-wrap img {
    width: 100%;
    height: 185px;
    object-fit: cover;
    transition: transform 0.4s ease;
    display: block;
  }

  .card:hover .card-img-wrap img {
    transform: scale(1.05);
  }

  .card-img-placeholder {
    width: 100%;
    height: 185px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    background: linear-gradient(135deg, var(--surface), var(--card));
  }

  .category-tag {
    position: absolute;
    top: 12px;
    left: 12px;
    background: rgba(10,13,20,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .rank-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(10,13,20,0.9);
    border: 2px solid var(--accent3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Kanit', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent3);
  }

  .card-body {
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-title {
    font-family: 'Kanit', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card-desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.6;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .vote-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 8px;
    padding: 7px 14px;
    color: var(--accent);
    font-family: 'Sarabun', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .vote-btn:hover {
    background: rgba(0,212,255,0.18);
    transform: scale(1.03);
  }

  .vote-btn.voted-btn {
    background: rgba(16,185,129,0.12);
    border-color: rgba(16,185,129,0.4);
    color: var(--green);
  }

  .vote-count {
    font-family: 'Kanit', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
  }

  .vote-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .vote-bar {
    height: 100%;
    background: var(--gradient);
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .link-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: flex;
    align-items: center;
  }

  .link-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Winner highlight */
  .card.winner {
    border-color: var(--accent3) !important;
    box-shadow: 0 0 30px rgba(245,158,11,0.15) !important;
  }

  .card.winner .rank-badge {
    background: var(--accent3);
    color: #000;
  }

  /* Empty state */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: var(--text-muted);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--green);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    box-shadow: 0 8px 24px rgba(16,185,129,0.3);
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* Category colors */
  .cat-ai { color: #818cf8; border-color: #818cf8; }
  .cat-esp32 { color: #34d399; border-color: #34d399; }
  .cat-rpi { color: #f472b6; border-color: #f472b6; }
  .cat-arduino { color: #fb923c; border-color: #fb923c; }
  .cat-sensor { color: #fbbf24; border-color: #fbbf24; }
  .cat-iot { color: #22d3ee; border-color: #22d3ee; }
  .cat-3dprint { color: #a78bfa; border-color: #a78bfa; }
  .cat-other { color: #94a3b8; border-color: #94a3b8; }

  @media (max-width: 640px) {
    header { padding: 12px 16px; }
    .hero { padding: 40px 16px 24px; }
    .controls { padding: 0 16px 24px; }
    .grid-container { padding: 0 16px 40px; grid-template-columns: 1fr; }
    .header-stats { display: none; }
  }
</style>
</head>

  let sortMode = 'default';
  
  function saveVotes() {
    localStorage.setItem('project_votes', JSON.stringify(votes));
    localStorage.setItem('my_votes', JSON.stringify(myVotes));
  }
  
  function getVoteCount(id) {
    return votes[id] || 0;
  }
  
  function hasVoted(id) {
    return myVotes.includes(id);
  }
  
  function totalVoteSum() {
    return Object.values(votes).reduce((a,b)=>a+b, 0);
  }
  
  function maxVotes() {
    return Math.max(...PROJECTS.map(p => getVoteCount(p.id)), 1);
  }
  
  function vote(id) {
    if (hasVoted(id)) {
      // Unvote
      votes[id] = Math.max(0, (votes[id]||0) - 1);
      myVotes = myVotes.filter(v => v !== id);
      showToast('ยกเลิกการโหวตแล้ว');
    } else {
      votes[id] = (votes[id]||0) + 1;
      myVotes.push(id);
      showToast('✅ โหวตสำเร็จ!');
    }
    saveVotes();
    render();
  }
  
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    t.style.background = msg.includes('ยกเลิก') ? '#ef4444' : 'var(--green)';
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  
  function getFiltered() {
    let list = [...PROJECTS];
    if (activeFilter !== 'all') list = list.filter(p => p.category === activeFilter);
    if (searchQuery) list = list.filter(p =>
      p.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
      p.desc.toLowerCase().includes(searchQuery.toLowerCase())
    );
    if (sortMode === 'votes') list.sort((a,b) => getVoteCount(b.id) - getVoteCount(a.id));
    if (sortMode === 'name') list.sort((a,b) => a.title.localeCompare(b.title, 'th'));
    return list;
  }
  
  function getRank(id) {
    const sorted = [...PROJECTS].sort((a,b) => getVoteCount(b.id) - getVoteCount(a.id));
    return sorted.findIndex(p => p.id === id) + 1;
  }
  
  function render() {
    const list = getFiltered();
    const grid = document.getElementById('projectGrid');
    const mx = maxVotes();
  
    document.getElementById('totalCount').textContent = PROJECTS.length;
    document.getElementById('votedCount').textContent = myVotes.length;
    document.getElementById('totalVotes').textContent = totalVoteSum();
  
    if (!list.length) {
      grid.innerHTML = '<div class="empty-state"><div style="font-size:3rem;margin-bottom:16px">🔍</div><div style="font-size:1.1rem;font-weight:600;margin-bottom:8px">ไม่พบโปรเจ็ก</div><div style="color:var(--text-muted)">ลองเปลี่ยน filter หรือคำค้นหา</div></div>';
      return;
    }
  
    grid.innerHTML = list.map(p => {
      const vc = getVoteCount(p.id);
      const voted = hasVoted(p.id);
      const rank = getRank(p.id);
      const isWinner = rank === 1 && vc > 0;
      const pct = mx > 0 ? (vc/mx)*100 : 0;
      const catClass = CAT_COLORS[p.category] || 'cat-other';
      const fallback = FALLBACK_IMGS[p.category] || FALLBACK_IMGS['other'];
  
      return `
      <div class="card ${voted ? 'voted' : ''} ${isWinner ? 'winner' : ''}" id="card-${p.id}">
        <div class="card-img-wrap">
          <!-- แสดงรูปจากโฟลเดอร์ img/ และกำหนด onerror ให้ดึงรูป placeholder หากหาไฟล์ไม่เจอ -->
          <img src="${p.img}" alt="${p.title}" loading="lazy" onerror="this.onerror=null; this.src='${fallback}';">
          <div class="category-tag ${catClass}">${p.category}</div>
          ${rank <= 3 && vc > 0 ? `<div class="rank-badge">#${rank}</div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${p.emoji} ${p.title}</div>
          <div class="card-desc">${p.desc}</div>
        </div>
        <div class="card-footer">
          <button class="vote-btn ${voted ? 'voted-btn' : ''}" onclick="vote(${p.id})">
            ${voted ? '✅ โหวตแล้ว' : '🗳️ โหวต'}
          </button>
          <div class="vote-bar-wrap">
            <div class="vote-bar" style="width:${pct}%"></div>
          </div>
          <span class="vote-count">${vc}</span>
          <a class="link-btn" href="${p.url}" target="_blank" title="ดูโปรเจ็ก">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
          </a>
        </div>
      </div>`;
    }).join('');
  }
  
  // Filter tabs
  document.getElementById('filterTabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeFilter = tab.dataset.cat;
    render();
  });
  
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    render();
  });
  
  document.getElementById('sortSelect').addEventListener('change', e => {
    sortMode = e.target.value;
    render();
  });
  
  // Initial render
  render();
  </script>
  </body>
  </html>
